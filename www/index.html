<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Pokédex — Real-World Pokémon Scanner</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- PWA meta tags -->
    <meta name="theme-color" content="#DC0A2D">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="pokedex-container">
        <!-- Main Frame -->
        <div class="pokedex-body">
            <!-- Top Light/Camera section -->
            <div class="pokedex-header">
                <div class="main-lens-container">
                    <div class="main-lens">
                        <div class="lens-glow"></div>
                        <div class="lens-inner"></div>
                    </div>
                </div>
                <div class="small-lights">
                    <div class="light light-red"></div>
                    <div class="light light-yellow"></div>
                    <div class="light light-green"></div>
                </div>
            </div>

            <!-- Viewport / Screen -->
            <div class="screen-frame">
                <div class="screen-border">
                    <div class="top-dot-container">
                        <div class="dot red"></div>
                        <div class="dot red"></div>
                    </div>
                    
                    <div class="viewport" id="viewport">
                        <video id="camera-feed" autoplay playsinline muted></video>
                        <canvas id="capture-canvas" style="display:none;"></canvas>
                        
                        <!-- Scanning Overlay -->
                        <div class="scan-overlay" id="scan-overlay">
                            <div class="scan-line"></div>
                            <div class="scan-grid"></div>
                            <div class="scan-reticle"></div>
                        </div>

                        <!-- Boot/Status Screen -->
                        <div class="status-overlay" id="status-overlay">
                            <div class="status-content">
                                <h2 id="status-text">INITIALIZING...</h2>
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progress-fill"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Identification Result (Floating Card) -->
                        <div class="result-card" id="result-card">
                            <div class="result-header">
                                <span class="result-label">TARGET IDENTIFIED</span>
                                <button class="close-btn" id="close-result">&times;</button>
                            </div>
                            <div class="result-body">
                                <div class="result-image-container">
                                    <img src="" id="pk-sprite" alt="Pokemon Sprite">
                                </div>
                                <div class="result-info">
                                    <h1 id="pk-name">PIKACHU</h1>
                                    <div class="pk-types" id="pk-types">
                                        <!-- Types will be added dynamically -->
                                    </div>
                                </div>
                            </div>
                            <div class="result-footer">
                                <button class="action-btn" id="view-details">DATA ENTRY</button>
                            </div>
                        </div>
                    </div>

                    <div class="bottom-controls-frame">
                        <div class="speaker-grill">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Interaction Area -->
            <div class="pokedex-controls">
                <div class="d-pad">
                    <div class="up"></div>
                    <div class="down"></div>
                    <div class="left"></div>
                    <div class="right"></div>
                    <div class="center-dot"></div>
                </div>
                
                <div class="main-buttons">
                    <button class="scan-trigger" id="scan-btn">
                        <div class="btn-glow"></div>
                        <span>SCAN</span>
                    </button>
                </div>

                <div class="secondary-controls">
                    <div class="long-btns">
                        <button class="rect-btn blue" id="settings-btn" title="Settings"></button>
                        <button class="rect-btn green" id="chat-btn" title="AI Assistant"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detail Overlay / Drawer -->
        <div class="detail-overlay" id="detail-overlay">
            <div class="detail-header">
                <button class="back-btn" id="back-to-scan">&larr; BACK</button>
                <div class="header-title">POKÉDEX DATA</div>
            </div>
            <div class="detail-content">
                <div id="data-view">
                    <!-- Dynamic Pokemon Stats & Info -->
                </div>
                <div id="chat-view" style="display:none;">
                    <div class="chat-container">
                        <div class="chat-history" id="chat-history">
                            <div class="message system">SYSTEM: Assistant ready. Ask about behavior or lore.</div>
                        </div>
                        <div class="chat-input-container">
                            <input type="text" id="chat-input" placeholder="Ask about Pikachu...">
                            <button id="send-btn">SEND</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Modal (for API Key) -->
        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <h2>POKÉDEX CONFIG</h2>
                <p>Enter your Google Gemini API Key:</p>
                <input type="password" id="api-key-input" placeholder="Paste API Key here...">
                <div class="modal-btns">
                    <button id="save-settings" class="btn-primary">SAVE</button>
                    <button id="close-settings" class="btn-secondary">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
